services:
  postgres:
    image: postgres:17-alpine
    container_name: zumi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: zumi
      POSTGRES_PASSWORD: zumi
      POSTGRES_DB: zumi
    ports:
      - '5432:5432'
    volumes:
      - zumi_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U zumi -d zumi']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: zumi-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - zumi_redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: zumi-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      CORS_ORIGIN: http://localhost:3000
      DATABASE_URL: postgresql://zumi:zumi@postgres:5432/zumi?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-me-please}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me-please}
    ports:
      - '4000:4000'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: zumi-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      ZUMI_API_URL: http://api:4000
    ports:
      - '3000:3000'

volumes:
  zumi_pg:
  zumi_redis:
